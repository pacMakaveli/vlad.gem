# PostgreSQL configuration for Vlad's Gem
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: vlad_gem_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: vlad_gem_test

production:
  primary:
    <<: *default
    database: vlad_gem_production
    username: vlad_gem
    password: <%= ENV["VLAD_GEM_DATABASE_PASSWORD"] %>
  cache:
    <<: *default
    database: vlad_gem_production_cache
    username: vlad_gem
    password: <%= ENV["VLAD_GEM_DATABASE_PASSWORD"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: vlad_gem_production_queue
    username: vlad_gem
    password: <%= ENV["VLAD_GEM_DATABASE_PASSWORD"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: vlad_gem_production_cable
    username: vlad_gem
    password: <%= ENV["VLAD_GEM_DATABASE_PASSWORD"] %>
    migrations_paths: db/cable_migrate
